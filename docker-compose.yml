services:
  yt-music-downloader:
    build: .
    image: yt-music-downloader:latest
    container_name: yt-music-downloader
    restart: unless-stopped
    ports:
      - "8000:8000"
    # /tmp is mounted as tmpfs (RAM) so transient download artifacts never
    # touch the host disk. 1G supports large video files.
    tmpfs:
      - /tmp:size=1g,mode=1777
    environment:
      - TZ=UTC
